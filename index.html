<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全跳转中...</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f4f5f7; font-family: sans-serif; }
        
        /* 微信环境下的黑底提示遮罩 */
        #wechat-mask {
            display: none; /* 默认隐藏 */
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 9999; color: #fff;
        }
        
        .guide-box { position: absolute; top: 20px; right: 20px; text-align: right; }
        .arrow { font-size: 50px; font-weight: bold; margin-bottom: 10px; margin-right: 15px;}
        .text-line { font-size: 18px; line-height: 1.6; margin: 5px 0; font-weight: 500;}
        
        /* 非微信环境的一闪而过提示 */
        #loading-text { text-align: center; margin-top: 120px; color: #666; font-size: 16px; }
    </style>
</head>
<body>

    <div id="loading-text">正在带您前往目标网页，请稍候...</div>

    <div id="wechat-mask">
        <div class="guide-box">
            <div class="arrow">↗</div>
            <div class="text-line">1. 请点击右上角的 <b style="font-size:22px">···</b> 按钮</div>
            <div class="text-line">2. 选择 <b>“在默认浏览器中打开”</b></div>
        </div>
    </div>

    <script>
        // 👇 【关键修改】在这里填入你那个在微信里打不开的独立域名链接
        var realWebsiteUrl = "https://hisword365.ccwu.cc/"; 

        // 检测是不是微信浏览器
        var ua = navigator.userAgent.toLowerCase();
        var isWechat = ua.indexOf('micromessenger') !== -1;

        if (isWechat) {
            // 如果是微信，显示黑色的指引遮罩，隐藏加载文字
            document.getElementById('wechat-mask').style.display = 'block';
            document.getElementById('loading-text').style.display = 'none';
        } else {
            // 如果是自带浏览器（如 Safari、Chrome），立刻跳转到真实网站
            window.location.replace(realWebsiteUrl);
        }
    </script>
</body>
</html>
